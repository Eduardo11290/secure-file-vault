version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vault_postgres
    restart: always
    environment:
      POSTGRES_USER: vault_admin
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: secure_vault_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vault_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: